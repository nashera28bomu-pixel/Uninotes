<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CymorUniNotes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css" />
<script>document.documentElement.setAttribute('data-theme', localStorage.getItem('cymor-theme') || 'dark');</script>
</head>
<body>

<header class="nav">
  <div class="nav__row container">
    <a href="index.html" class="brand" aria-label="CymorUniNotes home">
      <span class="brand__cymor">Cymor</span><span class="brand__uni">Uni</span><span class="brand__notes">Notes</span>
    </a>
    <form class="search-form" data-search-form role="search">
      <label class="search-form__field">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" placeholder="Search notes, subjects, courses..." aria-label="Search" />
      </label>
    </form>
    <button class="theme-toggle" data-theme-toggle aria-label="Toggle dark/light theme">🌓</button>
  </div>
</header>

<main class="container">
  <div class="page-head">
    <nav class="breadcrumb"><a href="index.html">Home</a><span>/</span><span id="crumb-resource">…</span></nav>
    <div id="resource-title" class="page-head__title">
      <span class="skeleton" style="width:260px;height:36px;"></span>
    </div>
  </div>

  <section class="section section--tight" id="resource-body">
    <div class="skeleton skeleton--card" style="height:400px;"></div>
  </section>
</main>

<footer class="footer">
  <div class="container footer__row">
    <span class="footer__brand">CymorUniNotes</span>
    <span>Built by Legendary Smiley Cymor · Cymor Tech Services</span>
  </div>
</footer>

<script src="../js/config.js"></script>
<script src="../js/theme.js"></script>
<script src="../js/api.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/nav.js"></script>
<script src="../js/resource.js"></script>
</body>
</html>
